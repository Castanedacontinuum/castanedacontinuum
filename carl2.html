<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- VIEWPORT -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TITLE + META -->
<title>CONVERGENCE — Carl 2</title>
<meta name="description" content="Convergence photograph by Carl Grillet — Castaneda Continuum.">

<!-- FAVICON -->
<link rel="icon" type="image/png" href="favicon.png">

<style>
    @font-face {
        font-family: 'Sylfaen';
        src: url('fonts/Sylfaen.ttf') format('truetype');
    }

    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: 'Sylfaen', serif;
        overflow-x: hidden;
    }

    /* VERBORGEN NAAM */
    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    /* NAVIGATIE */
    .navbar {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        z-index: 20;
    }

    .navbar a {
        position: relative;
        font-family: 'Sylfaen', serif;
        font-size: 2em;
        color: #ffffff;
        text-decoration: none;
        letter-spacing: 0.06em;
    }

    .navbar a::before {
        content: "";
        position: absolute;
        inset: -6px -12px;
        background: rgba(0, 0, 0, 0.30);
        border-radius: 999px;
        z-index: -1;
    }

    /* FOTO */
    .image-fixed {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-image: url('images/convergence/carl2.jpg');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        background-color: #000;
        user-select: none;
        pointer-events: none;
        z-index: -1;
    }

    /* MIST */
    .mist {
        position: relative;
        margin-top: 100vh;
        background: linear-gradient(
            to bottom,
            rgba(0,0,0,0.00) 0%,
            rgba(0,0,0,0.10) 20%,
            rgba(0,0,0,0.25) 40%,
            rgba(0,0,0,0.45) 60%,
            rgba(0,0,0,0.65) 80%,
            rgba(0,0,0,0.80) 100%
        );
        backdrop-filter: blur(4px);
        padding: 20px 0 220px 0; /* CREDIT HOOG */
    }

    .credit {
        text-align: center;
        font-size: 1.3rem;
        opacity: 0.8;
        margin-bottom: 160px;
        letter-spacing: 1px;
    }

</style>
</head>

<body>

<!-- VERBORGEN NAAM -->
<span class="visually-hidden">Steven Woestenborghs</span>

<!-- NAVIGATIE (A — Λ — Ω) -->
<div class="navbar">
    <a href="carl1.html" title="Back">Α</a>
    <a href="convergence.html" title="Home">Λ</a>
    <a href="carl3.html" title="Next">Ω</a>
</div>

<!-- FOTO -->
<div class="image-fixed"></div>

<!-- MIST -->
<div class="mist">
    <div class="credit">
        Original photograph by Carl Grillet
    </div>
</div>

</body>
</html>
