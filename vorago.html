        pointer-events: none;
        z-index: -1;

        margin-top: 100vh;
        background: linear-gradient(
            to bottom,
            rgba(0,0,0,0.00) 0%,
            rgba(0,0,0,0.10) 20%,
            rgba(0,0,0,0.25) 40%,
            rgba(0,0,0,0.45) 60%,

            rgba(0,0,0,0.80) 100%

        font-size: 2rem;
        margin-top: -285px;
        margin-bottom: 180px;
