<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Castaneda Continuum</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #000;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .portal {
      text-align: center;
      opacity: 0;
      animation: fadeIn 3s ease-out forwards;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .title {
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .totem {
      display: inline-block;
      text-align: left;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.25;
      margin-bottom: 2.5rem;
      opacity: 0.85;
    }

    .symbol {
      display: block;
      margin: 0 auto;
      max-width: 1200px;
      width: 70vw;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.12));
      opacity: 0;
      animation: fadeInSymbol 3s ease-out forwards;
    }

    @keyframes fadeInSymbol {
      0% { opacity: 0; transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="portal">

    <div class="title">CASTANEDA CONTINUUM</div>

    <div class="totem">
      PERCEPTION<br>
      /SHIFTED<br>
      //PERCEPTION
    </div>

    <img src="slang.png" alt="Feathered Serpent" class="symbol">

  </div>
</body>
</html>
